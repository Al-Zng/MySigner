name: Build MySigner (macOS) + Sign

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build (unsigned) for device SDK
        run: |
          set -e
          xcodebuild -project MySigner.xcodeproj \
            -scheme MySigner \
            -configuration Release \
            -sdk iphoneos \
            BUILD_DIR="$(pwd)/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

          APP_PATH="$(pwd)/build/Release-iphoneos/MySigner.app"
          echo "App path: $APP_PATH"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: App not found"; ls -la build || true; exit 1
          fi

          rm -rf Payload MySigner_unsigned.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r MySigner_unsigned.ipa Payload
          ls -lh MySigner_unsigned.ipa

      - name: Install zsign tool
        run: |
          brew install cmake openssl
          rm -rf zsign
          git clone https://github.com/zhlynn/zsign.git
          cd zsign
          rm -rf build
          mkdir build
          cd build
          cmake ..
          make -j$(sysctl -n hw.logicalcpu)
          sudo cp zsign /usr/local/bin/

      - name: Decrypt certificates
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          MOBILEPROVISION_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
        run: |
          echo "$P12_BASE64" | base64 -d > cert.p12
          echo "$MOBILEPROVISION_BASE64" | base64 -d > profile.mobileprovision

      - name: Sign IPA
        env:
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          zsign -k cert.p12 -p "$P12_PASSWORD" -m profile.mobileprovision -o MySigner.ipa MySigner_unsigned.ipa

      - name: Upload signed .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: MySigner-Signed.ipa
          path: MySigner.ipa